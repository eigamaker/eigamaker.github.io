<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格診断 - Profilecode</title>
    <meta name="description" content="Profilecodeの性格診断テストを受けて、あなたの性格タイプを診断します。MBTI、16PF、DISC診断が利用できます。">
    
    <!-- SEO: 診断フローページはnoindex -->
    <meta name="robots" content="noindex,nofollow" />
    <meta name="googlebot" content="noindex,nofollow" />
    
    <!-- i18n scripts -->
    <script src="js/translations.js"></script>
    <!-- URLパラメータ ?lang= を最優先で適用（初期レンダリング前） -->
    <script>
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang) {
          // サポートされている言語リスト
          const supportedLanguages = ['ar', 'de', 'en', 'es', 'fr', 'hi', 'id', 'it', 'ja', 'ko', 'pt', 'zh', 'zh_hant'];
          const normalizedLang = urlLang.toLowerCase().replace('_', '-');
          const langMap = {
            'zh-cn': 'zh',
            'zh-hans': 'zh',
            'zh-tw': 'zh_hant',
            'zh-hant': 'zh_hant',
            'zh-hk': 'zh_hant'
          };
          const baseLang = normalizedLang.split('-')[0];
          const finalLang = langMap[normalizedLang] || langMap[baseLang] || baseLang;
          if (supportedLanguages.includes(finalLang)) {
            // localStorageを上書き（URLパラメータ優先）
            localStorage.setItem('preferredLanguage', finalLang);
            // HTMLのlang属性を即座に設定（初期レンダリング前）
            document.documentElement.lang = finalLang;
          }
        }
      })();
    </script>
    <script src="js/i18n.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/sync-from-supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/account-migration.js"></script>
    <script src="js/supabase-save.js"></script>
    
    <link rel="stylesheet" href="/assets/css/test.css">
    <link rel="stylesheet" href="/assets/css/type-palettes.css">
  <!-- pc:head v1 -->
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#667eea">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/site.css">
  <meta property="og:image" content="https://profilecode.codes/assets/img/og/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://profilecode.codes/assets/img/og/og-default.png">
  <script src="/assets/js/analytics.js"></script>
  <!-- /pc:head -->
</head>
<body>
    <div class="container">
        <div class="lang-switcher">
            <!-- 主要言語（常時表示） -->
            <button class="lang-btn" data-lang="ja" onclick="switchLanguage('ja')">日本語</button>
            <button class="lang-btn" data-lang="en" onclick="switchLanguage('en')">English</button>

            <!-- その他の言語（ドロップダウン） -->
            <div style="position: relative;">
                <button class="lang-btn-more" onclick="toggleLangDropdown()" aria-label="More languages">
                    <span>More</span>
                    <span aria-hidden="true">▼</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button class="lang-btn" data-lang="ar" onclick="switchLanguage('ar')">العربية</button>
                    <button class="lang-btn" data-lang="de" onclick="switchLanguage('de')">Deutsch</button>
                    <button class="lang-btn" data-lang="es" onclick="switchLanguage('es')">Español</button>
                    <button class="lang-btn" data-lang="fr" onclick="switchLanguage('fr')">Français</button>
                    <button class="lang-btn" data-lang="hi" onclick="switchLanguage('hi')">हिन्दी</button>
                    <button class="lang-btn" data-lang="id" onclick="switchLanguage('id')">Bahasa Indonesia</button>
                    <button class="lang-btn" data-lang="it" onclick="switchLanguage('it')">Italiano</button>
                    <button class="lang-btn" data-lang="ko" onclick="switchLanguage('ko')">한국어</button>
                    <button class="lang-btn" data-lang="pt" onclick="switchLanguage('pt')">Português</button>
                    <button class="lang-btn" data-lang="zh" onclick="switchLanguage('zh')">简体中文</button>
                    <button class="lang-btn" data-lang="zh_hant" onclick="switchLanguage('zh_hant')">繁體中文</button>
                </div>
            </div>
        </div>
        
        <!-- 進捗バー -->
        <div class="progress-text" id="progressText">質問 1 / 40</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 2.5%"></div>
        </div>

        <!-- 質問セクション -->
        <div class="question-section active" id="questionSection">
            <div class="question-text" id="questionText"></div>
            <div class="options" id="options"></div>
            <div class="nav-buttons">
                <button class="nav-btn btn-prev" id="btnPrev" onclick="test.previousQuestion(); displayQuestion();" disabled data-i18n="prev">前へ</button>
                <div style="display: flex; gap: 10px; flex: 1; justify-content: flex-end;">
                    <button class="nav-btn btn-prev" id="btnReset" onclick="resetTest()" style="flex: 0 0 auto;" data-i18n="reset">やり直す</button>
                    <a href="/" class="nav-btn btn-prev" style="flex: 0 0 auto; text-decoration: none; display: inline-block;" data-i18n="backToTop">トップに戻る</a>
                </div>
            </div>
        </div>

        <!-- 結果セクション -->
        <div class="result-section" id="resultSection">
            <h1 class="result-title" data-i18n="results">診断結果</h1>
            <div class="result-tabs" id="resultTabs"></div>
            <div id="results"></div>
            <div id="shareCard"></div>
            <div id="saveOption"></div>
            <div class="action-buttons">
                <a href="/" class="action-btn btn-retry" onclick="gtag('event', 'back_to_top', {'event_category': 'ナビゲーション', 'event_label': 'トップに戻る'});" data-i18n="backToTopButton">トップに戻る</a>
                <a href="https://apps.apple.com/jp/app/profilecode-codes/id6747016000" class="action-btn btn-app" target="_blank" onclick="gtag('event', 'app_link_clicked', {'event_category': 'コンバージョン', 'event_label': 'App Store', 'value': 1});" data-i18n="viewInApp">アプリで詳しく見る</a>
                <button class="action-btn btn-retry" onclick="gtag('event', 'test_restarted', {'event_category': '診断', 'event_label': '再診断'}); test.resetAndRestart();" data-i18n="retakeTest">もう一度診断する</button>
            </div>
        </div>
        
        <!-- メールアドレス登録モーダル -->
        <div id="registerModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="modal-close" onclick="hideRegisterModal()">&times;</span>
                <h2 data-i18n="registerTitle">診断結果を保存する</h2>
                <p data-i18n="registerDescription">メールアドレスとパスワードを登録すると、診断結果をSupabaseに保存し、複数のデバイスでアクセスできるようになります。</p>
                <div class="form-group">
                    <label for="registerEmail" data-i18n="emailLabel">メールアドレス</label>
                    <input type="email" id="registerEmail" placeholder="example@example.com" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword" data-i18n="passwordLabelMin">パスワード（6文字以上）</label>
                    <input type="password" id="registerPassword" placeholder="パスワード" data-i18n="passwordPlaceholder" required minlength="6" onkeypress="if(event.key === 'Enter') handleRegister();">
                </div>
                <div id="registerError" class="error-message" style="display: none;"></div>
                <div class="modal-buttons">
                    <button id="registerSubmitBtn" class="btn-primary" onclick="handleRegister()" data-i18n="createAccount">登録</button>
                    <button class="btn-secondary" onclick="hideRegisterModal()" data-i18n="cancel">キャンセル</button>
                </div>
                <p style="margin-top: 20px; text-align: center; font-size: 0.9em;">
                    <a href="#" onclick="event.preventDefault(); hideRegisterModal(); showLoginModal();" style="color: #667eea;" data-i18n="switchToLogin">既にアカウントをお持ちの方はこちら</a>
                </p>
            </div>
        </div>
        
        <!-- ログインモーダル -->
        <div id="loginModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="modal-close" onclick="hideLoginModal()">&times;</span>
                <h2 data-i18n="login">ログイン</h2>
                <p data-i18n="loginDescription">メールアドレスとパスワードでログインすると、診断結果をSupabaseに保存し、複数のデバイスでアクセスできるようになります。</p>
                <div class="form-group">
                    <label for="loginEmail" data-i18n="emailLabel">メールアドレス</label>
                    <input type="email" id="loginEmail" placeholder="example@example.com" required onkeypress="if(event.key === 'Enter') document.getElementById('loginPassword').focus();">
                </div>
                <div class="form-group">
                    <label for="loginPassword" data-i18n="passwordLabel">パスワード</label>
                    <input type="password" id="loginPassword" placeholder="パスワード" data-i18n="passwordPlaceholder" required onkeypress="if(event.key === 'Enter') handleLogin();">
                </div>
                <div id="loginError" class="error-message" style="display: none;"></div>
                <div class="modal-buttons">
                    <button id="loginSubmitBtn" class="btn-primary" onclick="handleLogin()" data-i18n="login">ログイン</button>
                    <button class="btn-secondary" onclick="hideLoginModal()" data-i18n="cancel">キャンセル</button>
                </div>
                <p style="margin-top: 20px; text-align: center; font-size: 0.9em;">
                    <a href="#" onclick="event.preventDefault(); hideLoginModal(); showRegisterModal();" style="color: #667eea;" data-i18n="switchToRegister">アカウントをお持ちでない方はこちら</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/questions.js"></script>
    <script src="js/questions-loader.js"></script>
    <script src="js/result-translations.js"></script>
    <script src="js/result-translations-id.js"></script>
    <script src="js/result-details-en.js"></script>
    <script src="js/result-details-id.js"></script>
    <script src="js/result-translations-fallback.js"></script>
    <script src="js/calculators/profilecode-calculator.js"></script>
    <script src="js/calculators/four-indicator-calculator.js"></script>
    <script src="js/calculators/sixteen-factor-calculator.js"></script>
    <script src="js/calculators/disc-calculator.js"></script>
    <script src="js/personality-test.js"></script>
    <script src="/assets/js/test-app.js"></script>
</body>
</html>
