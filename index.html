<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Profilecode</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
        }
        h1 {
            font-size: 2rem;
            color: #333;
        }
    </style>
    <script>
        window.onload = function () {
            const userAgent = navigator.userAgent;

            if (/iPhone|iPad|iPod/i.test(userAgent)) {
                window.location.href = 'https://apps.apple.com/'; // App Store URL
            } else if (/Android/i.test(userAgent)) {
                window.location.href = 'https://play.google.com/store'; // Google Play URL
            } else {
                window.location.href = 'https://profilecode.codes'; // デフォルトURL
            }
        };
    </script>
</head>
<body>
    <h1>Welcome to Profilecode</h1>
</body>
</html>
